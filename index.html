<body>
	<div id="app" class="app">
		<aside class="sidebar">
			<div class="brand">
				<div class="brand-logo" aria-hidden="true"><img src="bilder/Wappen Neu.png" alt="ANEXIS Logo"></div>
				<div class="brand-title">ANEXIS</div>
				<span class="version">v0.2.0 Alpha</span>
				<div class="brand-subtitle">Behördliche Vorgangsbearbeitung</div>
			</div>
			<nav class="nav">
				<button data-route="dashboard" class="nav-btn active">Dashboard</button>
				<button data-route="persons" class="nav-btn">Personen</button>
				<button data-route="cases" class="nav-btn">Vorgänge</button>
				<button data-route="tasks" class="nav-btn">Aufgaben</button>
				<div class="nav-sep"></div>
				<div class="small muted">Lokale Akte • Behördenintern • Daten bleiben lokal.</div>
				<div class="sidebar-theme">
					<div class="theme-label">Ansichtsmodus</div>
					<label class="theme-switch">
						<input id="themeToggle" type="checkbox">
						<span class="theme-slider"></span>
					</label>
					<div class="theme-hint"><span>Dunkel</span><span>Hell</span></div>
				</div>
			</nav>
		</aside>

		<main class="main">
			<header class="topbar">
				<div class="topbar-left">
					<div class="page-label">@NEXIS VORGANGSBEARBEITUNG & PERSONENVERWALTUNG</div>
					<div class="page-title">Verwaltungssteuerung</div>
				</div>
				<div class="topbar-actions">
					<div class="search">
						<input id="globalSearch" placeholder="Suchen (Personen, Vorgänge)..." />
					</div>
					<div class="top-actions">
						<button id="btnQuickNew" class="btn primary">Neu</button>
					</div>
				</div>
			</header>

			<section id="view" class="view">
				<!-- Views are rendered here by app.js -->
			</section>

		</main>
